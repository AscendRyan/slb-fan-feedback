<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-label="Audience route map">
  <rect width="1000" height="430" rx="18" fill="#141414"/>
  <rect x="60" y="58" width="880" height="314" rx="18" fill="#0d0d0d" stroke="#2f2f2f" stroke-width="3"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="500" y="116" text-anchor="middle" fill="#f0d78c" font-size="30" font-weight="900" letter-spacing="5">ONE GATEWAY, FIVE ROUTES</text>
    <g transform="translate(120 170)">
      <rect width="130" height="98" rx="10" fill="#e85d3a"/>
      <text x="65" y="58" text-anchor="middle" fill="#0d0d0d" font-size="24" font-weight="900">/fan</text>
    </g>
    <g transform="translate(285 170)">
      <rect width="130" height="98" rx="10" fill="#f0d78c"/>
      <text x="65" y="58" text-anchor="middle" fill="#0d0d0d" font-size="24" font-weight="900">/player</text>
    </g>
    <g transform="translate(450 170)">
      <rect width="130" height="98" rx="10" fill="#e85d3a"/>
      <text x="65" y="58" text-anchor="middle" fill="#0d0d0d" font-size="24" font-weight="900">/media</text>
    </g>
    <g transform="translate(615 170)">
      <rect width="130" height="98" rx="10" fill="#f0d78c"/>
      <text x="65" y="58" text-anchor="middle" fill="#0d0d0d" font-size="24" font-weight="900">/partner</text>
    </g>
    <g transform="translate(780 170)">
      <rect width="130" height="98" rx="10" fill="#e85d3a"/>
      <text x="65" y="58" text-anchor="middle" fill="#0d0d0d" font-size="24" font-weight="900">/discount</text>
    </g>
    <text x="500" y="326" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">Each route renders the shared SurveyPage with audience-specific copy and questions.</text>
  </g>
</svg>
